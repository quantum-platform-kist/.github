name: FAB 기능 요청
description: FAB에서 필요하거나 개선되면 좋은 기능을 제안합니다.
title: "[FAB 기능]: "
body:
  - type: markdown
    attributes:
      value: |
        코드를 몰라도 괜찮습니다. 어떤 화면에서 무엇을 하려는지, 지금은 무엇이 불편한지, 원하는 결과가 무엇인지 중심으로 적어주세요.

  - type: checkboxes
    id: duplicate-check
    attributes:
      label: 중복 확인
      options:
        - label: 기존 issue에서 같은 제안이 이미 등록되었는지 확인했습니다.
          required: true

  - type: input
    id: summary
    attributes:
      label: 원하는 변화 한 줄 요약
      description: 원하는 기능이나 개선점을 한 문장으로 적어주세요.
      placeholder: 예) 예약 신청 화면에서 장비별 주의사항을 바로 확인하고 싶습니다.
    validations:
      required: true

  - type: dropdown
    id: feature-area
    attributes:
      label: 관련 FAB 기능
      description: 가장 가까운 항목을 선택해주세요. 정확히 몰라도 괜찮습니다.
      options:
        - 로그인/회원가입
        - 이메일 인증/비밀번호 재설정
        - 내 예약 캘린더
        - 예약 신청
        - 예약 상세/취소/수정
        - 내 수정 신청
        - 관리자 예약 관리
        - 관리자 사용자/권한 관리
        - 관리자 공지
        - 관리자 과제 계정
        - 기타/모르겠음
    validations:
      required: true

  - type: textarea
    id: current-situation
    attributes:
      label: 지금 불편한 점
      description: 현재 어떤 작업을 하려 할 때 불편하거나 막히는지 적어주세요.
      placeholder: 예) 장비 예약 전에 어떤 장비를 선택해야 하는지 설명을 찾기 어렵습니다.
    validations:
      required: true

  - type: textarea
    id: desired-experience
    attributes:
      label: 원하는 동작
      description: 버튼, 화면, 문구, 알림, 메일 등 사용자가 보게 될 결과를 기준으로 적어주세요.
      placeholder: 예) 예약 신청 화면에서 장비를 고르면 사용 가능 시간, 주의사항, 담당자 안내가 함께 보이면 좋겠습니다.
    validations:
      required: true

  - type: textarea
    id: user-flow
    attributes:
      label: 사용 흐름
      description: 사용자가 어떤 순서로 이 기능을 쓰면 좋을지 적어주세요.
      placeholder: |
        1. 사용자는 ...
        2. FAB에서 ...
        3. 사용자는 ...
    validations:
      required: false

  - type: textarea
    id: users
    attributes:
      label: 누가 사용하나요?
      description: 이 기능을 주로 사용할 사람이나 역할을 적어주세요.
      placeholder: 예) 일반 예약 사용자, 장비 관리자, 계정 관리자
    validations:
      required: false

  - type: input
    id: needed-by
    attributes:
      label: 필요한 시점
      description: 특정 일정 전까지 필요하다면 날짜나 이유를 적어주세요.
      placeholder: 예) 2026-07-01 장비 교육 전까지
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      description: 현재 업무에 미치는 영향을 선택해주세요.
      options:
        - 있으면 좋음
        - 업무에 필요
        - 업무가 막힘
        - 긴급
      default: 1
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 참고 자료
      description: 참고 화면, 스크린샷, 문서, 비슷한 사례가 있으면 추가해주세요.
    validations:
      required: false
