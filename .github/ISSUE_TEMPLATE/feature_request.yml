name: 추가 기능 제안
description: 새 기능이나 기존 기능 개선 아이디어를 제안합니다.
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        제안의 배경과 사용 시나리오가 드러나도록 작성해주세요. 구현 방식보다 해결하려는 문제를 먼저 적어주시면 검토가 쉬워집니다.

  - type: checkboxes
    id: duplicate-check
    attributes:
      label: 중복 확인
      options:
        - label: 기존 issue에서 같은 제안이 이미 등록되었는지 확인했습니다.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 현재 어떤 불편함, 한계, 필요가 있는지 설명해주세요.
      placeholder: 예) 실험 job을 비교할 때 결과 데이터를 수동으로 내려받아야 해서 반복 분석이 어렵습니다.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: 제안하는 기능
      description: 원하는 동작, 화면, API, 워크플로우를 구체적으로 적어주세요.
    validations:
      required: true

  - type: textarea
    id: user-scenario
    attributes:
      label: 사용 시나리오
      description: 누가, 언제, 어떤 흐름으로 이 기능을 사용할지 적어주세요.
      placeholder: |
        1. 사용자가 ...
        2. 시스템이 ...
        3. 사용자는 ...
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 검토한 대안
      description: 다른 해결 방법이나 임시 우회 방법이 있다면 적어주세요.
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: 영향 범위
      description: 관련 repo, 서비스, 화면, 모듈, 문서 등을 적어주세요.
      placeholder: 예) quantum-cloud / setup-a / gateway / 사용자 문서
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      description: 현재 판단하는 필요도를 선택해주세요.
      options:
        - 낮음
        - 보통
        - 높음
        - 긴급
      default: 1
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 추가 정보
      description: 참고 링크, 스크린샷, 관련 자료가 있으면 추가해주세요.
    validations:
      required: false
