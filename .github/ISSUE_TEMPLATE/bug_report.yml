name: 버그 리포트
description: 예상과 다르게 동작하는 문제나 오류를 신고합니다.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        문제를 빠르게 재현하고 원인을 좁힐 수 있도록 아래 항목을 가능한 한 구체적으로 작성해주세요.

  - type: checkboxes
    id: duplicate-check
    attributes:
      label: 중복 확인
      options:
        - label: 기존 issue에서 같은 문제가 이미 보고되었는지 확인했습니다.
          required: true

  - type: textarea
    id: summary
    attributes:
      label: 문제 요약
      description: 어떤 문제가 발생했는지 한두 문장으로 적어주세요.
      placeholder: 예) 실험 결과 화면에서 특정 job의 plot이 표시되지 않습니다.
    validations:
      required: true

  - type: input
    id: affected-area
    attributes:
      label: 영향받는 영역
      description: 관련 repo, 서비스, 화면, 모듈명을 적어주세요.
      placeholder: 예) quantum-cloud / setup-a / job-orchestrator / 문서
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: 재현 절차
      description: 문제를 재현할 수 있는 순서를 단계별로 적어주세요.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: 기대 동작
      description: 원래 어떻게 동작해야 하는지 적어주세요.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: 실제 동작
      description: 실제로 관찰한 동작을 적어주세요.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 로그 또는 오류 메시지
      description: 관련 로그, 콘솔 출력, 스택트레이스가 있으면 붙여주세요.
      render: shell
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: 실행 환경
      description: 브라우저, OS, 배포 환경, 버전, commit hash 등 관련 환경 정보를 적어주세요.
      placeholder: |
        - OS:
        - Browser:
        - Environment:
        - Version/Commit:
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 추가 정보
      description: 스크린샷, 링크, 참고 자료 등 문제 파악에 도움이 되는 정보를 적어주세요.
    validations:
      required: false
