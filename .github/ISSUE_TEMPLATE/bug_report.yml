name: FAB 오류 신고
description: FAB 사용 중 화면, 예약, 로그인 등이 예상과 다르게 동작한 문제를 신고합니다.
title: "[FAB 오류]: "
body:
  - type: markdown
    attributes:
      value: |
        코드를 몰라도 괜찮습니다. 어떤 화면에서 무엇을 하려 했는지, 실제로 무엇이 보였는지 중심으로 적어주세요. 개인정보나 비밀번호는 적지 마세요.

  - type: checkboxes
    id: duplicate-check
    attributes:
      label: 중복 확인
      options:
        - label: 기존 issue에서 같은 문제가 이미 보고되었는지 확인했습니다.
          required: true

  - type: textarea
    id: summary
    attributes:
      label: 오류 한 줄 요약
      description: 어떤 문제가 발생했는지 한두 문장으로 적어주세요.
      placeholder: 예) 예약 신청 버튼을 눌러도 예약이 완료되지 않습니다.
    validations:
      required: true

  - type: dropdown
    id: affected-feature
    attributes:
      label: 문제가 난 FAB 기능
      description: 가장 가까운 항목을 선택해주세요. 정확히 몰라도 괜찮습니다.
      options:
        - 로그인/회원가입
        - 이메일 인증/비밀번호 재설정
        - 내 예약 캘린더
        - 예약 신청
        - 예약 상세/취소/수정
        - 내 수정 신청
        - 관리자 예약 관리
        - 관리자 사용자/권한 관리
        - 관리자 공지
        - 관리자 과제 계정
        - 기타/모르겠음
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: 하려던 일
      description: 오류가 나기 전에 하려던 작업을 적어주세요.
      placeholder: 예) EBL 장비를 다음 주 오전 시간대로 예약하려고 했습니다.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: 오류가 발생한 순서
      description: 클릭한 메뉴, 버튼, 입력한 내용의 종류를 순서대로 적어주세요. 민감한 값은 제외해주세요.
      placeholder: |
        1. 로그인 후 ...
        2. ... 화면으로 이동했습니다.
        3. ... 버튼을 눌렀습니다.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: 기대한 결과
      description: 원래 어떤 결과가 나와야 한다고 생각했는지 적어주세요.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: 실제로 보인 결과
      description: 실제 화면 변화나 오류 문구를 적어주세요.
      placeholder: 예) 화면이 그대로 멈췄고, "예약 시간이 올바르지 않습니다"라는 문구가 보였습니다.
    validations:
      required: true

  - type: input
    id: page-location
    attributes:
      label: 화면 주소 또는 메뉴명
      description: 가능하면 브라우저 주소창의 주소나 화면 이름을 적어주세요.
      placeholder: 예) /dashboard/schedules 또는 예약 신청 화면
    validations:
      required: false

  - type: textarea
    id: occurrence-context
    attributes:
      label: 발생 시간과 사용 정보
      description: 문제를 찾는 데 도움이 되는 사용 상황을 적어주세요. 개인정보는 제외해주세요.
      placeholder: |
        - 발생 시간:
        - 사용 역할: 일반 사용자 / 관리자 / 모르겠음
        - 관련 장비나 예약 날짜:
    validations:
      required: false

  - type: dropdown
    id: browser
    attributes:
      label: 사용한 브라우저
      options:
        - Chrome
        - Edge
        - Safari
        - Firefox
        - 모바일 브라우저
        - 모르겠음
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 스크린샷 또는 추가 정보
      description: 스크린샷을 붙이거나, 화면에 보인 문구와 참고 자료를 적어주세요.
    validations:
      required: false
